<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Conversion Result</title>
    <style>
        body {
            width: 350px;
            min-height: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .conversion-result {
            text-align: center;
            margin: 20px 0;
        }

        .from-amount {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .arrow {
            font-size: 20px;
            margin: 10px 0;
            opacity: 0.8;
        }

        .to-amount {
            font-size: 32px;
            font-weight: 800;
            color: #FFD700;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            margin-top: 10px;
        }

        .exchange-rate {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 15px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-left: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            color: #FFB6C1;
            padding: 20px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .close-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="close-btn" id="closeBtn">×</button>
        
        <div class="header">
            <h1 class="title">ÖTEK Currency Converter</h1>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Converting currency...</div>
        </div>

        <div id="result" class="conversion-result" style="display: none;">
            <div class="from-amount" id="fromAmount"></div>
            <div class="arrow">↓</div>
            <div class="to-amount" id="toAmount"></div>
            <div class="exchange-rate" id="exchangeRate"></div>
        </div>

        <div id="error" class="error" style="display: none;">
            <div id="errorMessage"></div>
            <button class="retry-btn" id="retryBtn">Try Again</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
